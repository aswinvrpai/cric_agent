
services:
  app:
    image: 471112696784.dkr.ecr.us-east-1.amazonaws.com/cric-agent:latest        # overridden in production by docker pull
    build:
      context: .
      dockerfile: Dockerfile
    container_name: cric_agent_app
    restart: always
    ports:
      - "8000:8000"
    environment:
      - GROQ_API_KEY=${GROQ_API_KEY}
    env_file:
      - .env                        # local dev only — never committed
    volumes:
      - ./logs:/app/logs            # persist logs outside container

  nginx:
    image: nginx:alpine
    container_name: cric_agent_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
